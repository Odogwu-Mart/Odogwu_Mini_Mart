<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Store</title>
  
  <link rel="icon" type="image/png" href="icon-192.png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#FC0606">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <link
    rel="stylesheet"
    href="style.css"
  >

  <link
    href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap"
    rel="stylesheet"
  >

</head>

<body>

<div id="loadingOverlay" style="display: none;">
  <div class="loader"></div>
</div>
  
<div class="header sticky-header">

<div class="title-wrapper" style="display: flex; align-items: center; gap: 12px;">
      <div class="title">
        🛍️ Odogwu Mini-Mart
      </div>
      <button id="installPwaBtn" class="install-pwa-btn" style="display: none;">
        ⬇️ Install App
      </button>
    </div>

    <div class="header-actions">

      <div class="search-bar-container">
        
        <span class="search-icon">🔍</span>
        
        <input
          id="searchInput"
          class="search-bar-inner"
          type="text"
          placeholder="Search products..."
          oninput="renderProducts()"
        >
      </div>

      <button class="cart-btn-single" onclick="openCart()">
        <img id="cartIcon" src="" alt="Cart" style="display: none;">
        <span id="cartFallback">🛒</span>
        
        <span class="hide-mobile">Cart</span>
        <div class="cart-count" id="cartCount">0</div>
      </button>

    </div>

	<!-- CATEGORY CHIPS SECTION -->
<div id="categoryChipsSection" class="category-chips-section">
  <div class="chips-scroll-container">
    <div class="chips-wrapper" id="chipsWrapper"></div>
    <button class="chips-expand-btn" id="chipsExpandBtn" onclick="toggleCategoryExpand()">
      <span id="expandArrow">▼</span>
    </button>
  </div>
  <div class="category-expanded-menu" id="categoryExpandedMenu"></div>
</div>

  </div>

<div id="bannerCarousel"></div>
  
  <div
    class="products"
    id="products"
  ></div>

  <!-- CART -->

  <div
    class="modal-overlay"
    id="cartModal"
  >

    <div class="modal-box">

      <div class="modal-header">

        <div class="modal-title">
          🛒 Your Cart
        </div>

        <button
          class="close-modal"
          onclick="closeCart()"
        >
          ✕
        </button>

      </div>

      <div id="cartItems"></div>

      <button
        class="checkout-btn"
        onclick="openCheckout()"
      >

        Proceed To Checkout →

      </button>

      <!-- CHECKOUT -->

      <div
        class="checkout-form"
        id="checkoutForm"
      >

        <input
          type="tel"
          id="checkoutPhone"
          placeholder="Enter your delivery phone number"
        >

        <button
          class="checkout-btn"
          onclick="findDeliveryInfo()"
        >

          Continue →

        </button>

        <div id="deliveryUI"></div>
        
        <div id="deliveryOptions"></div>

      </div>

    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
